<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔹 Basic Info -->
    <title>VibeTalkz - Chat, Connect & Share Freely</title>
    <meta
      name="description"
      content="Join VibeTalkz — a fun, anonymous chat platform where you can connect, discuss, and vibe together in real-time."
    />
    <meta
      name="keywords"
      content="VibeTalkz, anonymous chat, real-time chat, online chat rooms, group discussions, open chat, fun social app, vibe talk app"
    />
    <meta name="author" content="Kishore R" />

    <!-- 🔹 Canonical URL (update this to your actual Vercel domain after deployment) -->
    <link rel="canonical" href="https://vibetalkz.vercel.app/" />

    <!-- 🔹 Open Graph (Social Preview) -->
    <meta property="og:title" content="VibeTalkz - Chat, Connect & Share Freely" />
    <meta
      property="og:description"
      content="VibeTalkz lets you chat and connect with people around the world in open chat rooms — anonymously and freely."
    />
    <meta property="og:image" content="/vibetalkz-logo.png" />
    <meta property="og:url" content="https://vibetalkz.vercel.app/" />
    <meta property="og:type" content="website" />

    <!-- 🔹 Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VibeTalkz - Chat, Connect & Share Freely" />
    <meta
      name="twitter:description"
      content="Join VibeTalkz for real-time group chats and AI conversations. It’s free, open, and fun!"
    />
    <meta name="twitter:image" content="/vibetalkz-logo.png" />

    <!-- 🔹 Robots -->
    <meta name="robots" content="index, follow" />

    <!-- 🔹 Structured Data for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "VibeTalkz",
        "url": "https://vibetalkz.vercel.app/",
        "description": "Join VibeTalkz for real-time anonymous chats and discussions with people around the world.",
        "publisher": {
          "@type": "Organization",
          "name": "VibeTalkz"
        }
      }
    </script>

    <!-- 🔹 Favicon (Use your logo from /public) -->
    <link rel="icon" type="image/png" href="/vibetalkz-logo.png" />
    <link rel="apple-touch-icon" href="/vibetalkz-logo.png" />

    <!-- 🔹 Main CSS (if you have one) -->
    <link rel="stylesheet" href="/styles.css" />

    <!-- 🔹 (Optional) AdSense or Analytics -->
    <!-- Keep only if you plan to use AdSense -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxxxxxxxxxx" crossorigin="anonymous"></script> -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
